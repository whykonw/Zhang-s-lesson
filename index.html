<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>我的课表</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card-hover: #222633;
    --border: #2a2e3d;
    --text: #e4e6ed;
    --text-dim: #8b8fa3;
    --accent: #6c7bff;
    --accent-glow: rgba(108, 123, 255, 0.15);
    --today-ring: #6c7bff;
    --c1: #ff6b6b; --c1bg: rgba(255,107,107,0.12);
    --c2: #ffa94d; --c2bg: rgba(255,169,77,0.12);
    --c3: #69db7c; --c3bg: rgba(105,219,124,0.12);
    --c4: #74c0fc; --c4bg: rgba(116,192,252,0.12);
    --c5: #da77f2; --c5bg: rgba(218,119,242,0.12);
    --c6: #ffd43b; --c6bg: rgba(255,212,59,0.12);
    --c7: #63e6be; --c7bg: rgba(99,230,190,0.12);
    --c8: #ff8787; --c8bg: rgba(255,135,135,0.12);
  }

  body {
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 80px 0;
    overflow-x: hidden;
  }

  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(15,17,23,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .header h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .week-badge {
    background: var(--accent);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 20px;
    letter-spacing: 0.3px;
  }

  .header-info {
    font-size: 13px;
    color: var(--text-dim);
    display: flex;
    gap: 12px;
  }

  .day-tabs {
    display: flex;
    gap: 6px;
    padding: 12px 20px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .day-tabs::-webkit-scrollbar { display: none; }

  .day-tab {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 14px;
    border-radius: 14px;
    background: var(--card);
    border: 1.5px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
    min-width: 52px;
  }

  .day-tab .day-name { font-size: 12px; color: var(--text-dim); font-weight: 500; }
  .day-tab .day-date { font-size: 16px; font-weight: 700; margin-top: 2px; }
  .day-tab .dot-row { display: flex; gap: 3px; margin-top: 4px; min-height: 6px; }
  .day-tab .dot { width: 5px; height: 5px; border-radius: 50%; }

  .day-tab.active {
    border-color: var(--today-ring);
    background: var(--accent-glow);
  }
  .day-tab.today .day-date { color: var(--accent); }

  .schedule-view {
    padding: 8px 16px;
  }

  .no-class {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-size: 15px;
  }

  .no-class .emoji { font-size: 40px; margin-bottom: 12px; }

  .time-slot {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
    align-items: stretch;
  }

  .time-col {
    flex-shrink: 0;
    width: 50px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 14px;
  }

  .time-col .t-start { font-size: 14px; font-weight: 600; }
  .time-col .t-end { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .time-col .t-line {
    flex: 1;
    width: 2px;
    background: var(--border);
    margin-top: 6px;
    border-radius: 1px;
  }

  .course-card {
    flex: 1;
    border-radius: 16px;
    padding: 14px 16px;
    position: relative;
    overflow: hidden;
    border: 1px solid var(--border);
    transition: transform 0.15s;
  }

  .course-card:active { transform: scale(0.98); }

  .course-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    border-radius: 4px 0 0 4px;
  }

  .course-card .course-name {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 6px;
    line-height: 1.4;
  }

  .course-card .course-meta {
    font-size: 12px;
    color: var(--text-dim);
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .course-card .course-meta span::before {
    display: inline-block;
    margin-right: 4px;
  }

  .course-card.inactive {
    opacity: 0.4;
    border-style: dashed;
  }

  .course-card.inactive .course-name::after {
    content: ' (本周无课)';
    font-size: 12px;
    font-weight: 400;
    color: var(--text-dim);
  }

  .course-card.ongoing {
    border-color: var(--accent);
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .course-card.ongoing::after {
    content: '进行中';
    position: absolute;
    top: 10px; right: 12px;
    font-size: 10px;
    font-weight: 600;
    color: var(--accent);
    background: var(--accent-glow);
    padding: 2px 8px;
    border-radius: 8px;
  }

  /* Color themes for courses */
  .c1 { background: var(--c1bg); } .c1::before { background: var(--c1); } .c1 .course-name { color: var(--c1); }
  .c2 { background: var(--c2bg); } .c2::before { background: var(--c2); } .c2 .course-name { color: var(--c2); }
  .c3 { background: var(--c3bg); } .c3::before { background: var(--c3); } .c3 .course-name { color: var(--c3); }
  .c4 { background: var(--c4bg); } .c4::before { background: var(--c4); } .c4 .course-name { color: var(--c4); }
  .c5 { background: var(--c5bg); } .c5::before { background: var(--c5); } .c5 .course-name { color: var(--c5); }
  .c6 { background: var(--c6bg); } .c6::before { background: var(--c6); } .c6 .course-name { color: var(--c6); }
  .c7 { background: var(--c7bg); } .c7::before { background: var(--c7); } .c7 .course-name { color: var(--c7); }
  .c8 { background: var(--c8bg); } .c8::before { background: var(--c8); } .c8 .course-name { color: var(--c8); }

  .week-grid {
    padding: 12px 20px 0;
  }

  .week-overview-title {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 10px;
    font-weight: 500;
  }

  .week-overview {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 16px;
  }

  .week-overview .wo-day {
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    padding: 4px 0;
  }

  .week-overview .wo-day.today { color: var(--accent); font-weight: 600; }

  .week-overview .wo-count {
    text-align: center;
    font-size: 18px;
    font-weight: 700;
    padding: 4px 0;
  }

  .footer-info {
    text-align: center;
    padding: 20px;
    font-size: 11px;
    color: var(--text-dim);
    opacity: 0.6;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>📚 我的课表</h1>
    <span class="week-badge" id="weekBadge">第-周</span>
  </div>
  <div class="header-info">
    <span id="dateInfo"></span>
    <span id="todayCount"></span>
  </div>
</div>

<div class="day-tabs" id="dayTabs"></div>

<div class="schedule-view" id="scheduleView"></div>

<div class="footer-info">2025-2026 春季学期 · 西南科技大学</div>

<script>
// ====== 学期配置 ======
const SEMESTER_START = new Date(2026, 2, 2); // 2026年3月2日（周一）

// ====== 作息时间 ======
const PERIOD_TIMES = {
  1: { start: '08:00', end: '09:40' },  // 第一二节
  2: { start: '10:00', end: '11:40' },  // 第三四节
  3: { start: '14:00', end: '15:40' },  // 第五六节
  4: { start: '16:00', end: '17:40' },  // 第七八节
  5: { start: '19:00', end: '20:40' },  // 第九十节
  6: { start: '20:50', end: '22:30' },  // 第十一十二节
};

// ====== 课程数据 ======
const COURSES = [
  // 星期一
  { name: '半导体物理', teacher: '张小伟', room: '西72208', day: 1, period: 4, weeks: [1,12], color: 'c2' },
  { name: '光电子材料及其应用', teacher: '郝艳/代云雅', room: '西72402', day: 1, period: 5, weeks: [1,12], color: 'c3' },

  // 星期二
  { name: '材料工厂设计概论', teacher: '曾敏', room: '西72407', day: 2, period: 3, weeks: [4,15], color: 'c1' },

  // 星期三
  { name: '磁性物理', teacher: '代波/许方', room: '西72211', day: 3, period: 1, weeks: [1,10], color: 'c4' },
  { name: '半导体物理', teacher: '张小伟', room: '西72409', day: 3, period: 3, weeks: [1,12], color: 'c2' },

  // 星期四
  { name: '材料进展（双语）', teacher: '张文', room: '西72207', day: 4, period: 1, weeks: [1,12], color: 'c5' },
  { name: '磁性物理', teacher: '代波/许方', room: '西72211', day: 4, period: 2, weeks: [1,10], color: 'c4' },
  { name: '形势与政策6', teacher: '陈奎儒', room: '西4105', day: 4, period: 3, weeks: [9,12], color: 'c7' },

  // 星期五
  { name: '轮滑俱乐部4', teacher: '付锦文', room: '东区运动场', day: 5, period: 2, weeks: [2,5], color: 'c6' },
  { name: '材料合成与制备技术A', teacher: '刘勋/沈金朋', room: '西71401', day: 5, period: 4, weeks: [1,16], color: 'c8' },
];

// ====== 工具函数 ======
function getTeachingWeek(date) {
  const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  const s = new Date(SEMESTER_START.getFullYear(), SEMESTER_START.getMonth(), SEMESTER_START.getDate());
  const diff = Math.floor((d - s) / 86400000);
  if (diff < 0) return 0;
  return Math.floor(diff / 7) + 1;
}

function isInWeekRange(week, range) {
  return week >= range[0] && week <= range[1];
}

function getDayLabel(dayOfWeek) {
  return ['日','一','二','三','四','五','六'][dayOfWeek];
}

function getCoursesForDay(dayNum, week) {
  return COURSES
    .filter(c => c.day === dayNum)
    .sort((a, b) => a.period - b.period);
}

function isOngoing(period, now) {
  const t = PERIOD_TIMES[period];
  const [sh, sm] = t.start.split(':').map(Number);
  const [eh, em] = t.end.split(':').map(Number);
  const h = now.getHours(), m = now.getMinutes();
  const cur = h * 60 + m;
  return cur >= sh * 60 + sm && cur <= eh * 60 + em;
}

// ====== 渲染 ======
const now = new Date();
const currentWeek = getTeachingWeek(now);
let selectedDayOffset = 0;

function getWeekDates() {
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const todayDow = today.getDay() === 0 ? 7 : today.getDay();
  const monday = new Date(today);
  monday.setDate(today.getDate() - (todayDow - 1));

  const dates = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    dates.push(d);
  }
  return dates;
}

const weekDates = getWeekDates();
const todayDow = now.getDay() === 0 ? 7 : now.getDay();

function init() {
  // Header
  document.getElementById('weekBadge').textContent =
    currentWeek > 0 && currentWeek <= 20 ? `第${currentWeek}周` : '假期中';

  const m = now.getMonth() + 1, d = now.getDate();
  document.getElementById('dateInfo').textContent =
    `${m}月${d}日 星期${getDayLabel(now.getDay())}`;

  const todayCourseCount = COURSES.filter(
    c => c.day === todayDow && isInWeekRange(currentWeek, c.weeks)
  ).length;
  document.getElementById('todayCount').textContent =
    todayCourseCount > 0 ? `今日${todayCourseCount}节课` : '今日无课';

  // Day tabs
  renderDayTabs();
  renderSchedule();
}

function renderDayTabs() {
  const container = document.getElementById('dayTabs');
  container.innerHTML = '';

  const dayNames = ['一','二','三','四','五','六','日'];

  weekDates.forEach((date, i) => {
    const dayNum = i < 6 ? i + 1 : 7;
    const isToday = date.toDateString() === now.toDateString();
    const isActive = i === selectedDayOffset;
    const w = getTeachingWeek(date);
    const courses = COURSES.filter(c => c.day === dayNum && isInWeekRange(w, c.weeks));

    const tab = document.createElement('div');
    tab.className = `day-tab${isActive ? ' active' : ''}${isToday ? ' today' : ''}`;
    tab.onclick = () => { selectedDayOffset = i; renderDayTabs(); renderSchedule(); };

    tab.innerHTML = `
      <span class="day-name">${dayNames[i]}</span>
      <span class="day-date">${date.getDate()}</span>
      <div class="dot-row">
        ${courses.slice(0, 4).map(c => `<span class="dot" style="background:var(--${c.color})"></span>`).join('')}
      </div>
    `;
    container.appendChild(tab);
  });

  // Scroll active tab into view
  setTimeout(() => {
    const active = container.querySelector('.active');
    if (active) active.scrollIntoView({ inline: 'center', behavior: 'smooth', block: 'nearest' });
  }, 50);
}

function renderSchedule() {
  const container = document.getElementById('scheduleView');
  const selectedDate = weekDates[selectedDayOffset];
  const dayNum = selectedDayOffset < 6 ? selectedDayOffset + 1 : 7;
  const week = getTeachingWeek(selectedDate);
  const isToday = selectedDate.toDateString() === now.toDateString();
  const allCourses = getCoursesForDay(dayNum, week);

  if (allCourses.length === 0) {
    container.innerHTML = `
      <div class="no-class">
        <div class="emoji">🎉</div>
        <div>这天没有课，好好休息！</div>
      </div>`;
    return;
  }

  let html = '';
  allCourses.forEach(c => {
    const t = PERIOD_TIMES[c.period];
    const active = isInWeekRange(week, c.weeks);
    const ongoing = isToday && active && isOngoing(c.period, now);

    html += `
      <div class="time-slot">
        <div class="time-col">
          <span class="t-start">${t.start}</span>
          <span class="t-end">${t.end}</span>
          <div class="t-line"></div>
        </div>
        <div class="course-card ${c.color}${!active ? ' inactive' : ''}${ongoing ? ' ongoing' : ''}">
          <div class="course-name">${c.name}</div>
          <div class="course-meta">
            <span>👤 ${c.teacher}</span>
            <span>📍 ${c.room}</span>
            <span>📅 第${c.weeks[0]}-${c.weeks[1]}周</span>
          </div>
        </div>
      </div>`;
  });

  container.innerHTML = html;
}

// 默认选中今天
selectedDayOffset = todayDow <= 6 ? todayDow - 1 : 6;
init();

// 每分钟刷新（更新进行中状态）
setInterval(() => renderSchedule(), 60000);
</script>
</body>
</html>
